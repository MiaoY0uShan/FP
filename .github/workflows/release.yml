name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.4.2)"
        required: true
        default: "0.4.2"

permissions:
  contents: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yml
    permissions:
      contents: read

  release:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Resolve and verify version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
            TAG="v${VERSION}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --no-tags --depth=1 origin +refs/heads/main:refs/remotes/origin/main
          TAG_COMMIT="$(git rev-parse "${GITHUB_SHA}^{commit}")"
          MAIN_COMMIT="$(git rev-parse "origin/main^{commit}")"
          if [ "${TAG_COMMIT}" != "${MAIN_COMMIT}" ]; then
            echo "Tag commit ${TAG_COMMIT} does not match origin/main ${MAIN_COMMIT}" >&2
            exit 1
          fi
          VERSION="$(tr -d '\r\n ' < VERSION)"
          TAG="v${VERSION}"
          if [ "${GITHUB_REF_NAME}" != "${TAG}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION ${VERSION}" >&2
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build and verify release assets
        shell: bash
        run: sh ./scripts/build-release-assets.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FP ${{ steps.version.outputs.tag }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
