name: validate

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_call:

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20

      - name: Check required source and entrypoints
        shell: bash
        run: |
          set -euo pipefail
          test -f VERSION
          test -f README.md
          test -f INSTALL.md
          test -f TEST_FP.md
          test -f fp/SKILL.md
          test -f fp/contracts/evidence-ledger.v1.schema.json
          test -f fp/generalization-gate/SKILL.md
          test -f fp/templates/debug-incident-checklist.md
          test -f fp/templates/multi-agent-review-protocol.md
          test -f fp/templates/generalization-evaluation.md
          test -f fp/templates/context-retrieval-contract.md
          test -f THIRD_PARTY_NOTICES.md
          test -f docs/assets/fp-banner.svg
          test -f install/universal/INSTALL-FP.ps1
          test -f install/universal/INSTALL-FP.sh
          test -f install/universal/INSTALL-FP.cmd
          test -f install/universal/.fp-package/payload/.agents/skills/fp/SKILL.md
          test -f install/universal/.fp-package/payload/.qoder/rules/fp.md
          test -f install/universal/.fp-package/payload/.roo/rules/fp.md
          test -f install/codex/.agents/skills/fp/SKILL.md
          test -f install/claude-code/.claude/skills/fp/SKILL.md
          test -f install/gemini-cli/fp/GEMINI.md
          test -f install/github-copilot-cli/.github/agents/fp.agent.md
          test -f install/github-copilot-cli/.github/instructions/fp.instructions.md
          test -f install/cursor/.cursor/rules/fp.mdc
          test -f install/windsurf/.windsurf/rules/fp.md
          test -f install/cline/.clinerules/fp.md
          test -f install/roo-code/.roo/rules/fp.md
          test -f install/opencode/.opencode/skills/fp/SKILL.md
          test -f install/kiro/.kiro/steering/fp.md
          test -f install/github-copilot-editor/.github/instructions/fp.instructions.md
          test -f install/aider/AIDER-CONFIG-SNIPPET.yml

      - name: Lint repository, release metadata, and contracts
        shell: bash
        run: |
          set -euo pipefail
          node scripts/lint-fp.js
          node scripts/lint-release.js
          node scripts/lint-contracts.js \
            --ledger fp/examples/password-reset.evidence-ledger.json \
            --brief fp/examples/password-reset.compiled-execution-brief.json

      - name: Run textual router invariants and executable contract tests
        run: node --test

      - name: Run explicit POSIX installer lifecycle smoke
        if: runner.os != 'Windows'
        shell: sh
        run: sh ./test/posix-installer-smoke.sh

      - name: Check generated install packs
        shell: pwsh
        run: ./scripts/sync-install-packs.ps1 -Check

      - name: Check diff hygiene
        run: git diff --check
